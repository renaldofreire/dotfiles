# ==========================================================
# CONFIGURAÇÕES GERAIS
# ==========================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",alacritty*:RGB"

set -g prefix ^A
set -g base-index 1
set -g pane-base-index 1         # Index das janelas E painéis começam em 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g set-clipboard on
set -g mouse on
set -g status-position top

# Diminuir o tempo de resposta do ESC (melhora muito o uso do Vim)
set -s escape-time 0

# ==========================================================
# ATALHOS (KEYBINDINGS)
# ==========================================================
setw -g mode-keys vi

# Recarregar config rapidamente
bind r source-file ~/.tmux.conf \; display "Config Recarregada!"

# Splits intuitivos (abre no diretório atual)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navegação de painéis (Sem prefixo usando Alt + h/j/k/l)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Seleção e Cópia estilo Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ==========================================================
# PLUGINS (TPM)
# ==========================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

# Continuum Configuration
set -g @continuum-restore 'on'

# Configuração do Tema Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_background "default" # Fundo transparente para Alacritty

# Customização da barra de status
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# ==========================================================
# INICIALIZAÇÃO
# ==========================================================
run '~/.tmux/plugins/tpm/tpm'
