# ==========================================================
# CONFIGURAÇÕES GERAIS
# ==========================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-features ",alacritty*:RGB"

set -g prefix ^A
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g set-clipboard on
set -g mouse on
set -g status-position top

set -s escape-time 0

# ==========================================================
# ATALHOS (KEYBINDINGS)
# ==========================================================
setw -g mode-keys vi

bind r source-file ~/.tmux.conf \; display "Config Recarregada!"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ==========================================================
# PLUGINS (TPM)
# ==========================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# ==========================================================
# APARÊNCIA NEUTRA (Adapta-se a qualquer tema)
# ==========================================================
# Transparência total
set -g status-style "bg=default"
set -g pane-border-style "fg=default,dim"
set -g pane-active-border-style "fg=default"

# Barra de status minimalista
set -g status-left-length 50
set -g status-left "#[fg=blue,bold] #S #[fg=default,dim]│ "

set -g status-right-length 50
set -g status-right "#[fg=default,dim]%H:%M #[fg=blue,bold] "

# Estilo das Janelas
set -g window-status-format "#[fg=default,dim] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "

# = :D
# ==========================================================
# INICIALIZAÇÃO
# ==========================================================
run '~/.tmux/plugins/tpm/tpm'
