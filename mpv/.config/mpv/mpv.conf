# Salvar posição ao sair
save-position-on-quit

loop-file='inf'

# Idioma preferencial (Legenda e Áudio)
slang=pt-BR,en
alang=ja,jp,en,pt-BR

# Subtitles
sub-font="Liberation Sans"
sub-font-size=36
sub-color="#FFFFCC"
sub-border-color="#000000"
sub-border-size=2.5
sub-shadow-color="#000000"
sub-shadow-offset=1
sub-bold=yes
sub-pos=95
sub-margin-x=80
sub-margin-y=22
sub-ass-override=force
#sub-ass-override=scale

# Sempre usar a melhor qualidade (VP9 prioritário)
# ytdl-format=bestvideo[height<=1080][vcodec^=av01]+bestaudio/bestvideo[height<=1080][vcodec^=vp9]+bestaudio/bestvideo[height<=1080]+bestaudio/best
ytdl-format=bestvideo[height<=1080][vcodec^=vp9]+bestaudio/bestvideo[height<=1080]+bestaudio/best

# Perfil de alta qualidade
profile=gpu-hq
vo=gpu-next
hwdec=auto-safe

# Escalamento de qualidade
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=ewa_lanczossharp

# Correção de cores
vf-add=format=colorlevels=full:colormatrix=bt.709

# Interpolação de frames (vídeo mais suave)
video-sync=display-resample
interpolation=yes
tscale=oversample

# HDR/cores melhores
target-prim=auto
target-trc=auto
icc-profile-auto=yes

# Cache maior para streaming (evita travamentos)
cache=yes
demuxer-max-bytes=150M

# Screenshot em PNG de alta qualidade
screenshot-format=png
screenshot-png-compression=0
screenshot-directory=~/Pictures/mpv-screenshots

# OSD (informações na tela) mais limpo
osd-font-size=30
osd-border-size=2
