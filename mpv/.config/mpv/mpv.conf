# ==========================================================
# CONFIGURAÇÕES GERAIS E INTERFACE
# ==========================================================
save-position-on-quit
loop-file='inf'
osd-font-size=30
osd-border-size=2

# ==========================================================
# PERFORMANCE E HARDWARE (Otimizado para Intel Arc B580)
# ==========================================================
profile=gpu-hq
vo=gpu-next
gpu-api=vulkan       # Vulkan costuma performar melhor em GPUs Intel Arc modernas
hwdec=vaapi          # Decodificação direta via VA-API (Intel)

# Priorizar AV1 (Sua GPU suporta via hardware!) > VP9 > H264
ytdl-format=bestvideo[height<=1080][vcodec^=av01]+bestaudio/bestvideo[height<=1080][vcodec^=vp9]+bestaudio/bestvideo[height<=1080]+bestaudio/best

# ==========================================================
# QUALIDADE VISUAL (UPSCALING)
# ==========================================================
scale=ewa_lanczossharp
cscale=ewa_lanczossharp
dscale=mitchell      # Mitchell é melhor para downscaling (vídeo 4K em tela 1080p)
video-sync=display-resample
interpolation=yes
tscale=oversample    # Suaviza movimentos sem efeito "novela"

# ==========================================================
# CACHE E REDE (Melhorado para Streaming)
# ==========================================================
cache=yes
demuxer-max-bytes=400M
demuxer-max-back-bytes=150M
# Evita travamentos iniciais
cache-pause=yes

# ==========================================================
# LEGENDAS (Suas configurações originais - MANTIDAS)
# ==========================================================
slang=pt-BR,en
alang=ja,jp,en,pt-BR
sub-font="Liberation Sans"
sub-font-size=36
sub-color="#FFFFCC"
sub-border-color="#000000"
sub-border-size=2.5
sub-shadow-color="#000000"
sub-shadow-offset=1
sub-bold=yes
sub-pos=95
sub-margin-x=80
sub-margin-y=22
sub-ass-override=force

# ==========================================================
# SCREENSHOTS
# ==========================================================
screenshot-format=png
screenshot-png-compression=0
screenshot-directory=~/Pictures/mpv-screenshots
screenshot-template="%F-%P"

# ==========================================================
# PERFIS AUTOMÁTICOS
# ==========================================================
# Se for 4K, desativa interpolação para economizar GPU
[4k-performance]
profile-cond=width >= 3840
interpolation=no
deband=no
