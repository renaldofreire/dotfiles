import = [
  "current-theme.toml"
]

[general]
live_config_reload = true

[env]
TERM = "xterm-256color"

[window]
decorations = "buttonless"
dynamic_padding = false
opacity = 1.0
blur = false

[window.padding]
x = 12
y = 0

[font]
size = 11.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[cursor]
style = { shape = "Block", blinking = "On" }
vi_mode_style = { shape = "Beam" }

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[terminal.shell]
program = "/bin/zsh"
